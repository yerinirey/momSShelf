services:
  - type: web
    name: moms-shelf-worker
    runtime: node
    plan: free
    rootDir: worker
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ALLOWED_EMAILS
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
